<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in - SpikeFit</title>
  
  <!-- Load local fonts -->
  <link rel="stylesheet" href="/fonts/fonts.css">
  
  <style>
    /* Inline styles are allowed by the 'unsafe-inline' style-src directive in the Worker.
      If you previously had Tailwind or custom CSS, you can place it here or link an external CSS file.
    */
    :root {
      --primary: #e80a89;
      --primary-hover: #c90876;
      --bg: #f4f6f8;
      --text: #2d3748;
      --text-muted: #718096;
      --error: #e53e3e;
    }
    body {
      font-family: 'Source Sans 3', Helvetica, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #ffffff;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-sizing: border-box;
    }
    .logo {
      width: 160px;
      margin-bottom: 2rem;
    }
    h2 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
    }
    p {
      color: var(--text-muted);
      margin: 0 0 1.5rem;
      font-size: 0.95rem;
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(232, 10, 137, 0.1);
    }
    button {
      width: 100%;
      padding: 0.75rem 1rem;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      font-family: inherit;
    }
    button:hover:not(:disabled) {
      background-color: var(--primary-hover);
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .btn-ghost {
      background-color: transparent;
      color: var(--text-muted);
      margin-top: 0.5rem;
    }
    .btn-ghost:hover:not(:disabled) {
      background-color: #f7fafc;
      color: var(--text);
    }
    .error-message {
      color: var(--error);
      font-size: 0.875rem;
      min-height: 1.25rem;
      margin-top: 0.5rem;
    }
    .step {
      display: none;
    }
    /* Set step-email to block by default so it shows on first load */
    #step-email {
      display: block;
    }
  </style>

  <!-- External JS file inclusion - CSP compliant -->
  <script src="/auth.js" defer></script>
</head>
<body>
  <div class="container">
    <img src="/logo.png" alt="SpikeFit" class="logo">
    
    <!-- Step 1: Email Input -->
    <div id="step-email" class="step">
      <h2>Welcome back</h2>
      <p>Enter your email to sign in to SpikeFit</p>
      <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" required>
      <button id="email-btn">Send Sign-In Code</button>
      <div id="email-error" class="error-message"></div>
    </div>

    <!-- Step 2: OTP Verification -->
    <div id="step-otp" class="step">
      <h2>Check your email</h2>
      <p id="otp-subtitle">We sent a 6-digit code to your email.</p>
      <input type="text" id="otp-input" placeholder="••••••" maxlength="6" autocomplete="one-time-code" pattern="\d*">
      <button id="otp-btn">Verify Code</button>
      <button class="btn-ghost">Back</button>
      <div id="otp-error" class="error-message"></div>
    </div>

    <!-- Step 3: Success -->
    <div id="step-success" class="step">
      <h2>Success!</h2>
      <p>Signing you in...</p>
    </div>
  </div>
</body>
</html>
